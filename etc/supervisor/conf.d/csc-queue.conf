# /etc/supervisor/conf.d/csc-queue.conf

[program:csc-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/csc-recruitment/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/csc-recruitment/storage/logs/worker.log

# Apply configuration:
# sudo supervisorctl reread
# sudo supervisorctl update
# sudo supervisorctl start csc-queue-worker:*
